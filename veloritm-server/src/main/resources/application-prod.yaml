# Production profile. All secrets/endpoints come from environment variables.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

logging:
  # Structured JSON logs (ECS format) for ingestion by the log pipeline. traceId is carried in the MDC.
  structured:
    format:
      console: ecs
  level:
    com.veloritm: INFO
